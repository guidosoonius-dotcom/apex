    // ── TiltCard — mouse-tracking perspective tilt with glare ─────────────────
    function TiltCard({children, className='', style={}, intensity=10, glareOpacity=0.14, onClick}) {
      const ref = useRef(null);
      const [tilt, setTilt] = useState({x:0,y:0,active:false});
      const [glare, setGlare] = useState({x:50,y:50});

      const onMove = useCallback((e) => {
        const el = ref.current; if(!el) return;
        const r = el.getBoundingClientRect();
        const nx = (e.clientX - r.left) / r.width;
        const ny = (e.clientY - r.top)  / r.height;
        setTilt({x:(ny-0.5)*-intensity, y:(nx-0.5)*intensity, active:true});
        setGlare({x:nx*100, y:ny*100});
      }, [intensity]);

      const onLeave = useCallback(() => setTilt({x:0,y:0,active:false}), []);

      return (
        <div
          ref={ref}
          className={`light-sweep ${className}`}
          onMouseMove={onMove}
          onMouseLeave={onLeave}
          onClick={onClick}
          style={{
            ...style,
            transform:`perspective(700px) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`,
            transition: tilt.active ? 'transform 0.08s ease' : 'transform 0.55s cubic-bezier(0.4,0,0.2,1)',
            cursor: onClick ? 'pointer' : style.cursor,
          }}
        >
          {children}
          {/* Dynamic glare */}
          <div style={{position:'absolute',inset:0,borderRadius:'inherit',pointerEvents:'none',zIndex:6,
            background:`radial-gradient(circle at ${glare.x}% ${glare.y}%, rgba(255,255,255,${tilt.active?glareOpacity:0}), transparent 55%)`,
            transition:tilt.active?'none':'opacity 0.4s ease',
          }}/>
        </div>
      );
    }

        defaultInstructions:'Structure every deck around a clear pyramid: headline message → supporting argument → evidence. One key message per slide — if you need two messages, use two slides. Open with a storyboard slide that previews the argument. Integrate visual assets from the Visual Asset Register consistently. Write speaker notes that add context and talking points, not just repeated slide text. The deck must stand alone without the presenter if needed.'},

      { id:'dp',  name:'Document Production Agent',  tier:5, model:'sonnet', icon:'doc',
        description:'Long-form reports and executive summaries as polished documents.',
        purpose:'Produces polished, client-ready long-form documents. Ensures consistent structure, authoritative prose, and logical coherence across large outputs.',
        outputs:['Full report','Executive summary','Formal document','Annotated appendices'],
        defaultInstructions:'Produce polished, client-ready documents. Open every report with an Executive Summary of no more than one page — busy executives will read nothing else. Use a consistent heading hierarchy throughout. Write in authoritative, jargon-free prose — if a word can be simpler, use the simpler word. Every section must advance the core argument; remove content that does not. Number all exhibits and reference them in the body text.'},

      { id:'pa',  name:'Planning Agent',             tier:5, model:'sonnet', icon:'calendar',
        description:'Engagement Gantt plan and fixed-fee budget model in Excel.',
        purpose:'Builds the operational plan and commercial model for engagements. Ensures work is sequenced, resourced, and priced with discipline.',
        outputs:['Gantt plan','Fixed-fee budget','Resource model','Critical path analysis'],
        defaultInstructions:'Build realistic, deliverable-driven project plans — not aspirational ones. Sequence by deliverable and gate, not by activity. Apply fixed-fee pricing discipline: estimate by deliverable with clear scope boundaries, then build in 15–20% buffer for gate rework cycles. Identify the critical path and flag where a delay cascades. Do not use hardcoded numbers — every figure must be formula-driven and traceable. Flag resource constraints and single points of failure explicitly.'},

      { id:'km',  name:'Knowledge Manager',          tier:6, model:'sonnet', icon:'archive',
        description:'Steward of firm IP library. Semantic retrieval at engagement start; engagement summary logging.',
        purpose:'Maintains and activates the firm\'s accumulated intelligence. Ensures every engagement benefits from prior work and every engagement enriches the knowledge base.',
        outputs:['Prior work retrieval','Engagement summary','IP index update','Pattern analysis'],
        defaultInstructions:'Surface the most relevant prior work at the start of every engagement — prioritise by recency and sector relevance. When retrieving, provide a brief summary of what each prior piece contains and why it is relevant, not just a citation. At engagement close, log a structured summary including: client context, approach used, key findings, and what worked or did not. Over time, identify patterns across engagements to build firm-level intelligence.'},

      { id:'bd',  name:'Business Development Agent', tier:6, model:'sonnet', icon:'briefcase',
        description:'Proposal production engine. Fixed-fee pricing; agent configuration proposals; case study grounding.',
        purpose:'Produces compelling, commercially disciplined proposals. Converts client problems into well-scoped, clearly priced engagements that win on value, not just price.',
        outputs:['Client proposal','Fixed-fee pricing','Agent config proposal','Case study pack'],
        defaultInstructions:'Produce proposals that win on clarity and confidence. Lead with a precise articulation of the client\'s problem — demonstrate you understand their situation before describing your solution. Structure as: situation → complication → resolution → investment. Use fixed-fee pricing with explicit scope boundaries — never open-ended day rates. Justify the fee by referencing the value of the outcome, not the effort involved. Ground every proposal in relevant case studies from the Knowledge Manager.'},
    ];

    const DELIVERABLES = [
      {id:'proposal',    label:'Proposal',                       phase:'Sales',   agents:['km','bd']},
      {id:'agent_config',label:'Agent Configuration Proposal',   phase:'Sales',   agents:['km','bd','eda']},
      {id:'ai_strategy', label:'AI Strategy Report',             phase:'Delivery',agents:['km','eda','sr','sa','ci','isa','em','va','da','dp']},
      {id:'op_model',    label:'Operating Model Design',         phase:'Delivery',agents:['km','eda','sr','oma','dta','sca','isa','em','va','da']},
      {id:'biz_case',    label:'Business Case',                  phase:'Delivery',agents:['km','eda','sr','fa','isa','em','va','dp']},
      {id:'cx_assess',   label:'Customer Experience Assessment', phase:'Delivery',agents:['km','eda','sr','uxa','isa','em','va','dp']},
      {id:'reg_report',  label:'Regulatory Landscape Report',    phase:'Delivery',agents:['km','eda','rc','isa','em','dp']},
      {id:'workshop',    label:'Workshop Pack',                  phase:'Delivery',agents:['km','eda','wsl','sca','em','da']},
    ];

    const GATES = [
      {id:'H', name:'Hypothesis Gate',description:'Validates engagement hypothesis, methodology, and approach design before analysis begins.'},
      {id:'G1',name:'Insight Gate',   description:'Reviews Strategic Insight Memo before narrative assembly starts.'},
      {id:'G3',name:'Final Gate',     description:'Final quality gate before client delivery. All deliverables reviewed.'},
    ];

    const TIER_LABELS = {
      1:'Tier 1 — Leadership',2:'Tier 2 — Engagement Design',
      3:'Tier 3 — Research',  4:'Tier 4 — Specialist Analysis',
      5:'Tier 5 — Production',6:'Tier 6 — Firm Operations',
    };

    const SECTORS = ['Technology','Financial Services','Healthcare','Retail','Energy','Manufacturing','Professional Services','Public Sector','Media & Entertainment','Other'];

    // ── Shared styles ─────────────────────────────────────────────────────────
    const btnSt = (bg,fg=C.white) => ({
      display:'inline-flex',alignItems:'center',gap:6,padding:'8px 16px',borderRadius:9,
      background:bg,border:'1px solid rgba(255,255,255,0.12)',color:fg,fontSize:13,fontWeight:600,
      cursor:'pointer',whiteSpace:'nowrap',
      boxShadow:'0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.10)',
    });
    const inputSt = {
      width:'100%',
      background:'rgba(255,255,255,0.05)',
      backdropFilter:'blur(8px)',
      WebkitBackdropFilter:'blur(8px)',
      border:'1px solid rgba(255,255,255,0.10)',
      borderRadius:9,padding:'10px 12px',color:C.white,fontSize:13,fontFamily:'Sora,sans-serif',
      boxShadow:'inset 0 1px 4px rgba(0,0,0,0.25)',
    };
    const labelSt = {
      fontSize:11,fontWeight:600,color:C.fog,display:'block',
      marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em',
    };

    // ── Icons ─────────────────────────────────────────────────────────────────
    const PATHS = {

      warn:      <><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
      rework:    <><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></>,
      file:      <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
      upload:    <><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></>,
      spinner:   <><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></>,
      chevron:   <polyline points="9 18 15 12 9 6"/>,
      key:       <><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></>,
      dot:       <circle cx="12" cy="12" r="5" fill="currentColor"/>,
      doc:       <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
      shield:    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
      // Agent role icons
      star:      <><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
      briefcase: <><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></>,
      layout:    <><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
      compass:   <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
      users:     <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></>,
      search:    <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
      globe:     <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></>,
      target:    <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
      scale:     <><line x1="12" y1="22" x2="12" y2="11"/><path d="M17 22H7"/><path d="M20.25 6l-4-4-4 4"/><path d="M3.75 6l4-4 4 4"/><line x1="3.75" y1="6" x2="20.25" y2="6"/></>,
      trending:  <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
      layers:    <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
      database:  <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
      monitor:   <><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>,
      gitmerge:  <><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 009 9"/></>,
      zap:       <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
      barchart:  <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
      slides:    <><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="12" x2="13" y2="12"/></>,
      calendar:  <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
      archive:   <><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></>,
    };
    function Icon({name,size=16,color='currentColor',style:sx={}}) {
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,...sx}}>{PATHS[name]||PATHS.dot}</svg>;
    }

    // ── Primitive components (stable, defined at module level) ────────────────
    function Toggle({value,onChange}) {
      return <div onClick={()=>onChange(!value)} style={{width:38,height:21,borderRadius:11,background:value?C.teal:C.slateMid,position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}><div style={{position:'absolute',top:3,left:value?20:3,width:15,height:15,borderRadius:'50%',background:C.white,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.4)'}}/></div>;
    }
    function Pill({label,color=C.teal}) {
      return <span style={{padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:600,fontFamily:'DM Mono,monospace',letterSpacing:'.04em',background:color+'22',color,border:`1px solid ${color}44`,whiteSpace:'nowrap'}}>{label}</span>;
    }
    function Avatar({agent,size=32,active}) {
      const color=TIER_COLOR[agent.tier];
      const iconSize=Math.round(size*0.48);
      return (
        <div style={{width:size,height:size,borderRadius:Math.max(5,size/5),
          background: active ? color+'30' : color+'1A',
          border:`1.5px solid ${active?color:color+'44'}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:active?`0 0 10px ${color}55, inset 0 1px 0 rgba(255,255,255,0.12)`:'none',
          transition:'all .2s',flexShrink:0}}>
          {agent.icon && PATHS[agent.icon]
            ? <svg width={iconSize} height={iconSize} viewBox="0 0 24 24" fill="none"
                stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
                {PATHS[agent.icon]}
              </svg>
            : <span style={{fontSize:size*.30,fontWeight:700,color,fontFamily:'DM Mono,monospace',lineHeight:1}}>
                {agent.id.slice(0,2).toUpperCase()}
              </span>
          }
        </div>
      );
    }

    const FEED_TYPE = {
      agent_start:{icon:'dot',  label:'Started', color:C.teal},
      agent_output:{icon:'doc', label:'Output',  color:C.cloud},
      agent_complete:{icon:'check',label:'Complete',color:C.green},
      gate_open:{icon:'gate',   label:'Gate Open',color:C.gold},
      gate_verdict:{icon:'shield',label:'Verdict',color:C.gold},
      error:{icon:'warn',       label:'Error',   color:C.red},
      info:{icon:'dot',         label:'Info',    color:C.fog},
      engagement_complete:{icon:'check',label:'Done',color:C.green},
    };

    // FeedEvent is stable — no parent state captured in its definition
    function FeedEvent({event}) {
      const [expanded,setExpanded]=useState(false);
      const agent=AGENTS.find(a=>a.id===event.agentId);
      const color=agent?TIER_COLOR[agent.tier]:C.fog;
      const tc=FEED_TYPE[event.type]||FEED_TYPE.info;
      const isLong=event.content&&event.content.length>400;
      const shown=(!expanded&&isLong)?event.content.slice(0,400)+'…':event.content;
      const isMono=event.type==='agent_output';
      return (
        <div className="slideUp feed-item" style={{padding:'10px 12px',borderRadius:8,marginBottom:2,borderBottom:'1px solid rgba(255,255,255,0.04)',display:'flex',gap:12,alignItems:'flex-start',transition:'background .15s'}}>
          <div style={{paddingTop:3,flexShrink:0}}><Icon name={tc.icon} size={11} color={tc.color}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              {agent&&<span style={{fontSize:11,fontWeight:700,color,fontFamily:'DM Mono,monospace'}}>{agent.id.toUpperCase()}</span>}
              <span style={{fontSize:11,color:C.fog}}>{tc.label}</span>
              {event.verdict&&<Pill label={event.verdict} color={{PASS:C.green,CONDITIONAL:C.amber,REWORK:C.red}[event.verdict]||C.fog}/>}
              <span style={{fontSize:10,color:C.slateLight,marginLeft:'auto',whiteSpace:'nowrap'}}>{new Date(event.ts).toLocaleTimeString()}</span>
            </div>
            {shown&&<div style={{fontSize:12,color:isMono?C.tealLight:C.cloud,lineHeight:1.55,fontFamily:isMono?'DM Mono,monospace':'Sora,sans-serif',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{shown}</div>}
            {isLong&&<button onClick={()=>setExpanded(e=>!e)} style={{background:'none',border:'none',color:C.teal,fontSize:11,cursor:'pointer',marginTop:4,padding:0}}>{expanded?'Collapse':'Expand'}</button>}
          </div>
        </div>
      );
    }

    // ── EngagementModal — stable top-level component ──────────────────────────
    // Deliverable icons (simple letter badges per phase)
    const DEL_ICON = {
      proposal:'P', agent_config:'AC',
      ai_strategy:'AI', op_model:'OM', biz_case:'BC',
      cx_assess:'CX', reg_report:'RR', workshop:'WS',
    };

    function EngagementModal({draft, setDraft, setShowModal, launchEngagement, dragOver, setDragOver, handleDrop, deliverableMappings}) {
      const salesD    = DELIVERABLES.filter(d=>d.phase==='Sales');
      const deliveryD = DELIVERABLES.filter(d=>d.phase==='Delivery');
      const canLaunch = draft.client.trim() && draft.brief.trim() && draft.deliverable;

      // Select a deliverable: sets it and resets agents to the current (possibly customised) mapping
      const selectDeliverable = (id) => {
        const defaults = deliverableMappings[id] || DELIVERABLES.find(d=>d.id===id)?.agents || [];
        setDraft(p => ({...p, deliverable: id, agents: [...defaults]}));
      };

      // Toggle a single agent on/off
      const toggleAgent = (agentId) => {
        setDraft(p => ({
          ...p,
          agents: p.agents.includes(agentId)
            ? p.agents.filter(x => x !== agentId)
            : [...p.agents, agentId],
        }));
      };

      // Reset agents to current deliverable mapping (which may have been edited in the matrix)
      const resetAgents = () => {
        const defaults = deliverableMappings[draft.deliverable] || DELIVERABLES.find(d=>d.id===draft.deliverable)?.agents || [];
        setDraft(p => ({...p, agents: [...defaults]}));
      };

      return (
        <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(4,10,22,0.72)',backdropFilter:'blur(18px) saturate(150%)',WebkitBackdropFilter:'blur(18px) saturate(150%)',display:'flex',alignItems:'center',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="slideUp" style={{...GL.panel,width:700,maxHeight:'92vh',overflowY:'auto',borderRadius:20,padding:'30px 34px',boxShadow:'0 32px 80px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.10)'}}>

            {/* Header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:26}}>
              <h2 style={{fontFamily:'Fraunces,serif',fontSize:22,fontWeight:600,color:C.white}}>New Engagement</h2>
              <button onClick={()=>setShowModal(false)} style={{background:'none',border:'none',cursor:'pointer',color:C.fog,padding:4}}><Icon name="close" size={18}/></button>
            </div>

            {/* Client + Sector */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
              <div>
                <label style={labelSt}>Client Name *</label>
                <input value={draft.client} onChange={e=>setDraft(p=>({...p,client:e.target.value}))} placeholder="e.g. Acme Corporation" style={inputSt}/>
              </div>
              <div>
                <label style={labelSt}>Sector</label>
                <select value={draft.sector} onChange={e=>setDraft(p=>({...p,sector:e.target.value}))} style={inputSt}>
                  <option value="">Select sector…</option>
                  {SECTORS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>

            {/* Brief */}
            <div style={{marginBottom:18}}>
              <label style={labelSt}>Engagement Brief *</label>
              <textarea value={draft.brief} onChange={e=>setDraft(p=>({...p,brief:e.target.value}))} placeholder="Describe the client's challenge, strategic objective, and engagement context…" rows={4} style={inputSt}/>
            </div>

            {/* File drop */}
            <div onDrop={handleDrop} onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
              style={{border:`1.5px dashed ${dragOver?C.teal:C.slateMid}`,borderRadius:10,padding:'12px 16px',marginBottom:22,background:dragOver?C.teal+'0D':'transparent',textAlign:'center',transition:'all .15s',cursor:'pointer'}}>
              <Icon name="upload" size={16} color={dragOver?C.teal:C.fog} style={{margin:'0 auto 4px',display:'block'}}/>
              <div style={{fontSize:11,color:C.fog}}>Drop files to attach</div>
              {draft.files.map((f,i)=><div key={i} style={{fontSize:11,color:C.teal,marginTop:4,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}><Icon name="file" size={10} color={C.teal}/> {f.name}</div>)}
            </div>

            {/* ── Deliverable type ── */}
            <div style={{marginBottom:22}}>
              <label style={labelSt}>Deliverable Type *</label>

              {/* Sales */}
              <div style={{fontSize:10,fontWeight:700,color:C.slateLight,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,marginTop:2}}>Sales</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                {salesD.map(d=>{
                  const sel = draft.deliverable === d.id;
                  return (
                    <div key={d.id} onClick={()=>selectDeliverable(d.id)}
                      style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:10,cursor:'pointer',background:sel?C.teal+'20':C.slateMid,border:`1.5px solid ${sel?C.teal:'transparent'}`,transition:'all .15s'}}>
                      <div style={{width:32,height:32,borderRadius:8,background:sel?C.teal+'33':C.slateLight+'44',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:9,fontWeight:700,color:sel?C.teal:C.fog,fontFamily:'DM Mono,monospace',letterSpacing:'.04em'}}>
                        {DEL_ICON[d.id]}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:sel?600:400,color:sel?C.white:C.cloud,lineHeight:1.3}}>{d.label}</div>
                      </div>
                      {sel&&<Icon name="check" size={14} color={C.teal}/>}
                    </div>
                  );
                })}
              </div>

              {/* Delivery */}
              <div style={{fontSize:10,fontWeight:700,color:C.slateLight,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Delivery</div>

            </button>
          </div>
          <div style={{
            background:'rgba(0,0,0,0.35)',

    function AgentConfigPanel({agent, config, setAgentConfigs, onClose}) {
      const tc = TIER_COLOR[agent.tier];
      const isCustomised = !!(config?.customInstructions?.trim() || config?.model || config?.maxTokens);

      const update = (patch) => {
        setAgentConfigs(prev => {
          const next = { ...prev, [agent.id]: { ...(prev[agent.id]||{}), ...patch } };
          localStorage.setItem('apex_agent_configs', JSON.stringify(next));
          return next;
        });
      };

      const reset = () => {
        setAgentConfigs(prev => {
          const next = { ...prev };
          delete next[agent.id];
          localStorage.setItem('apex_agent_configs', JSON.stringify(next));
          return next;
        });
      };

      const model     = config?.model     || agent.model;
      const maxTokens = config?.maxTokens || 2048;
      const instructions = config?.customInstructions || '';

      const sectionLabel = {fontSize:10,fontWeight:700,color:C.fog,textTransform:'uppercase',
        letterSpacing:'.08em',fontFamily:'DM Mono,monospace',marginBottom:8,display:'block'};

      return (
        <div className="slideRight" style={{width:380,borderLeft:'1px solid rgba(255,255,255,0.07)',
          display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0,
          background:'rgba(6,6,8,0.72)',backdropFilter:'blur(28px)',WebkitBackdropFilter:'blur(28px)'}}>

          {/* Header */}
          <div style={{padding:'20px 20px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:12}}>
              <Avatar agent={agent} size={44}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:15,fontWeight:700,color:C.white,letterSpacing:'-.01em',marginBottom:3}}>
                  {agent.name}
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                  <Pill label={`Tier ${agent.tier}`} color={tc}/>
                  <span style={{fontSize:10,color:C.slateLight,fontFamily:'DM Mono,monospace'}}>{agent.id}</span>
                  {isCustomised&&<Pill label="CUSTOMISED" color={C.gold}/>}
                </div>
              </div>
              <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',
                color:C.fog,padding:4,flexShrink:0}}>
                <Icon name="close" size={16}/>
              </button>
            </div>
            <p style={{fontSize:11,color:C.fog,lineHeight:1.55}}>{agent.description}</p>
          </div>

          {/* Scrollable body */}
          <div style={{flex:1,overflowY:'auto',padding:'18px 20px',display:'flex',flexDirection:'column',gap:22}}>

            {/* ── Agent Default Profile ── */}
            <div style={{...GL.inner,padding:'16px',borderRadius:14,
              background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)'}}>
              {/* Purpose */}
              {agent.purpose&&(
                <div style={{marginBottom:14}}>
                  <span style={{fontSize:9,fontWeight:700,color:C.teal,textTransform:'uppercase',
                    letterSpacing:'.1em',fontFamily:'DM Mono,monospace',display:'block',marginBottom:6}}>
                    Purpose
                  </span>
                  <p style={{fontSize:12,color:C.cloud,lineHeight:1.65,margin:0}}>{agent.purpose}</p>
                </div>
              )}

              {/* Outputs */}
              {agent.outputs&&agent.outputs.length>0&&(
                <div style={{marginBottom:14}}>
                  <span style={{fontSize:9,fontWeight:700,color:C.teal,textTransform:'uppercase',
                    letterSpacing:'.1em',fontFamily:'DM Mono,monospace',display:'block',marginBottom:8}}>
                    Outputs
                  </span>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    {agent.outputs.map((o,i)=>(
                      <span key={i} style={{fontSize:10,fontWeight:600,color:tc,
                        background:tc+'18',border:`1px solid ${tc}40`,
                        borderRadius:6,padding:'3px 9px',letterSpacing:'.01em',lineHeight:1.4}}>
                        {o}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {/* Default Instructions */}
              {agent.defaultInstructions&&(
                <DefaultInstructionsBlock instructions={agent.defaultInstructions} tc={tc}/>
              )}
            </div>

            {/* ── Override controls ── */}
            <div style={{height:1,background:'rgba(255,255,255,0.06)',flexShrink:0,
              position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,0.25)',textTransform:'uppercase',
                letterSpacing:'.1em',fontFamily:'DM Mono,monospace',background:'rgba(6,6,8,0.72)',
                padding:'0 10px',position:'absolute'}}>
                Custom Overrides
              </span>
            </div>

            {/* Model */}
            <div>
              <span style={sectionLabel}>Model</span>
              <div style={{display:'flex',gap:8}}>
                {[{key:'sonnet',label:'Sonnet 4',color:C.teal},{key:'opus',label:'Opus 4',color:C.gold}].map(m=>{
                  const active = model===m.key;
                  return (
                    <button key={m.key} onClick={()=>update({model:m.key})}
                      style={{flex:1,padding:'10px 0',borderRadius:10,cursor:'pointer',
                        fontSize:12,fontWeight:700,transition:'all .15s',
                        background: active ? m.color+'28' : 'rgba(255,255,255,0.04)',
                        border: `1.5px solid ${active ? m.color+'88' : 'rgba(255,255,255,0.08)'}`,
                        color: active ? m.color : C.fog,
                        boxShadow: active ? `0 2px 12px ${m.color}22, inset 0 1px 0 rgba(255,255,255,0.08)` : 'none',
                      }}>
                      {m.label}
                      {m.key===agent.model&&<span style={{fontSize:9,marginLeft:5,opacity:.6}}>(default)</span>}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Max tokens */}
            <div>
              <span style={sectionLabel}>Max Output Tokens — {maxTokens.toLocaleString()}</span>
              <input type="range" min={256} max={4096} step={256} value={maxTokens}
                onChange={e=>update({maxTokens:Number(e.target.value)})}
                style={{width:'100%',accentColor:tc,cursor:'pointer'}}/>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                {[256,1024,2048,4096].map(v=>(
                  <button key={v} onClick={()=>update({maxTokens:v})}
                    style={{background:'none',border:'none',cursor:'pointer',
                      fontSize:9,fontFamily:'DM Mono,monospace',
                      color: maxTokens===v ? tc : 'rgba(255,255,255,0.25)',
                      fontWeight: maxTokens===v ? 700 : 400}}>
                    {v===256?'256':v===1024?'1k':v===2048?'2k':'4k'}
                  </button>
                ))}
              </div>
            </div>

            {/* Custom Instructions */}
            <div>
              <span style={sectionLabel}>Custom Instructions</span>
              <textarea
                value={instructions}
                onChange={e=>update({customInstructions:e.target.value})}
                placeholder={`Override ${agent.name}'s default behaviour.\n\nExamples:\n• Always cite sources and add confidence ratings\n• Format output as a numbered executive brief\n• Apply a sceptical, risk-focused lens to all findings`}
                rows={7}
                style={{...inputSt,resize:'vertical',lineHeight:1.6,fontSize:12}}
              />
              <div style={{fontSize:10,color:'rgba(255,255,255,0.25)',marginTop:6,lineHeight:1.5}}>
                Appended to the base system prompt on every run. Changes take effect immediately on the next engagement.
              </div>
            </div>

            {/* Presets */}
            <div>
              <span style={sectionLabel}>Quick presets</span>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {PRESETS.map(p=>(
                  <button key={p.label} onClick={()=>update({customInstructions:p.text})}
                    style={{...GL.inner,padding:'9px 13px',cursor:'pointer',textAlign:'left',
                      display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,
                      border:`1px solid rgba(255,255,255,${instructions===p.text?'.18':'.06'})`,
                      background:`rgba(255,255,255,${instructions===p.text?'.07':'.03'})`,
                      transition:'all .15s'}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:instructions===p.text?C.white:C.cloud,marginBottom:2}}>{p.label}</div>
                      <div style={{fontSize:10,color:C.fog,lineHeight:1.4,overflow:'hidden',
                        display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
                        {p.text}
                      </div>
                    </div>
                    {instructions===p.text&&<Icon name="check" size={13} color={tc}/>}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{padding:'12px 20px',borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0,
            display:'flex',gap:8,alignItems:'center'}}>
            {isCustomised?(
              <button onClick={reset}
                style={{...btnSt(C.slateMid),fontSize:11,padding:'7px 14px',color:C.red,
                  border:'1px solid rgba(229,82,82,0.30)'}}>
                <Icon name="rework" size={11} color={C.red}/> Reset to defaults
              </button>
            ):(
              <span style={{fontSize:11,color:'rgba(255,255,255,0.25)',fontFamily:'DM Mono,monospace'}}>
                Using default configuration
              </span>
            )}
          </div>
        </div>
      );
    }

    // ── ViewAgents ────────────────────────────────────────────────────────────
    function ViewAgents({activeAgents, feed, deliverableMappings, setDeliverableMappings, agentConfigs, setAgentConfigs}) {
      const [tab, setTab] = useState('roster');
      const [selectedAgent, setSelectedAgent] = useState(null);

      const toggleCell = (agentId, delId) => {
        setDeliverableMappings(prev => {
          const cur = prev[delId] || [];
          return {
            ...prev,
            [delId]: cur.includes(agentId) ? cur.filter(x=>x!==agentId) : [...cur, agentId],
          };
        });
      };

      const resetMappings = () => {
        const m = {};
        DELIVERABLES.forEach(d => { m[d.id] = [...d.agents]; });
        setDeliverableMappings(m);
      };

      const tabSt = (active) => ({
        padding:'6px 16px', borderRadius:7, fontSize:12, fontWeight:600,
        cursor:'pointer', border:'none', transition:'all .15s',
        background: active ? C.slateMid : 'transparent',
        color: active ? C.white : C.fog,
      });

      const customCount = Object.keys(agentConfigs||{}).filter(id=>
        agentConfigs[id]?.customInstructions?.trim()||agentConfigs[id]?.model||agentConfigs[id]?.maxTokens
      ).length;

      // Count how many agents are in each deliverable
      const delCounts = DELIVERABLES.map(d => (deliverableMappings[d.id]||[]).length);

      return (
        <div className="fadeIn" style={{display:'flex',height:'100%',overflow:'hidden'}}>

        <div style={{flex:1,overflowY:'auto',padding:'28px 36px',maxWidth:1100,minWidth:0}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:22}}>

              <h1 style={{fontFamily:'Fraunces,serif',fontSize:26,fontWeight:600,color:C.white}}>Agent Roster</h1>
              <p style={{color:C.fog,fontSize:13,marginTop:4}}>
                21 agents across 6 tiers
                {customCount>0&&<span style={{marginLeft:10,color:C.gold,fontFamily:'DM Mono,monospace',fontSize:11}}>· {customCount} customised</span>}
              </p>
            </div>
            {/* Tab switcher */}
            <div style={{display:'flex',gap:4,background:'rgba(255,255,255,0.04)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',borderRadius:10,padding:4,border:'1px solid rgba(255,255,255,0.09)'}}>
              <button onClick={()=>setTab('roster')} style={tabSt(tab==='roster')}>Roster</button>
              <button onClick={()=>setTab('matrix')} style={tabSt(tab==='matrix')}>Deliverable Matrix</button>
            </div>
          </div>

          {/* ── ROSTER VIEW ── */}
          {tab==='roster' && (
            <div>
              {[1,2,3,4,5,6].map(tier=>{
                const ta=AGENTS.filter(a=>a.tier===tier);
                const tc=TIER_COLOR[tier];
                return (
                  <div key={tier} style={{marginBottom:28}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                      <div style={{width:3,height:16,background:tc,borderRadius:2}}/>
                      <span style={{fontSize:11,fontWeight:700,color:tc,textTransform:'uppercase',letterSpacing:'.07em'}}>{TIER_LABELS[tier]}</span>
                      <span style={{fontSize:10,color:C.slateLight}}>{ta.length} agent{ta.length!==1?'s':''}</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:12}}>
                      {ta.map(agent=>{
                        const isActive   = activeAgents.has(agent.id);
                        const cfg        = agentConfigs?.[agent.id]||{};
                        const isCustom   = !!(cfg.customInstructions?.trim()||cfg.model||cfg.maxTokens);
                        const isSelected = selectedAgent?.id===agent.id;
                        const effectiveModel = cfg.model||agent.model;
                        return (
                          <div key={agent.id} className={`gl-card${isActive?' glow':''}`}
                            style={{...GL.card,
                              border:`1px solid ${isSelected?tc+'88':isActive?tc+'66':isCustom?`${C.gold}44`:'rgba(255,255,255,0.08)'}`,
                              borderRadius:10,padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start',
                              boxShadow:isSelected?`0 4px 24px ${tc}33, inset 0 1px 0 rgba(255,255,255,0.12)`:isActive?`0 4px 20px ${tc}22, inset 0 1px 0 rgba(255,255,255,0.08)`:'0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06)',
                              cursor:'pointer',
                            }}
                            onClick={()=>setSelectedAgent(isSelected?null:agent)}>
                            <Avatar agent={{...agent, model:effectiveModel}} size={36} active={isActive}/>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                                <span style={{fontWeight:600,fontSize:13,color:C.white}}>{agent.name}</span>
                                {isActive&&<div className="pulse" style={{width:6,height:6,borderRadius:'50%',background:tc}}/>}
                                {isCustom&&<Pill label="CUSTOM" color={C.gold}/>}
                              </div>
                              <div style={{fontSize:11,color:C.fog,lineHeight:1.45,marginBottom:8}}>{agent.description}</div>
                              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                                <Pill label={effectiveModel==='opus'?'opus-4-6':'sonnet-4-6'} color={effectiveModel==='opus'?C.gold:C.teal}/>
                                {cfg.maxTokens&&cfg.maxTokens!==2048&&<Pill label={`${cfg.maxTokens} tok`} color={C.fog}/>}
                                <span style={{fontSize:10,color:C.slateLight,fontFamily:'DM Mono,monospace'}}>{agent.id}</span>
                              </div>
                            </div>
                            <button onClick={e=>{e.stopPropagation();setSelectedAgent(isSelected?null:agent);}}
                              style={{background:'none',border:`1px solid ${isSelected?tc+'66':'rgba(255,255,255,0.08)'}`,
                                borderRadius:7,padding:'4px 8px',cursor:'pointer',color:isSelected?tc:C.fog,
                                fontSize:10,display:'flex',alignItems:'center',gap:4,flexShrink:0,marginTop:2}}>
                              <Icon name="context" size={11} color={isSelected?tc:C.fog}/>
                              {isSelected?'Close':'Config'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── MATRIX VIEW ── */}
          {tab==='matrix' && (
            <div>
              {/* Legend + reset */}
              <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:18}}>
                <div style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:C.fog}}>
                  <div style={{width:14,height:14,borderRadius:'50%',background:C.teal}}/>
                  <span>Included in deliverable</span>
                  <div style={{width:14,height:14,borderRadius:'50%',border:`2px solid ${C.slateLight}`,marginLeft:10}}/>
                  <span>Not included — click to add</span>
                </div>
                <button onClick={resetMappings} style={{marginLeft:'auto',background:'none',border:"1px solid rgba(255,255,255,0.07)",color:C.fog,borderRadius:6,padding:'5px 12px',fontSize:11,cursor:'pointer'}}>
                  Reset all to defaults
                </button>
              </div>

              {/* Matrix table */}
              <div style={{overflowX:'auto'}}>
                <div style={{minWidth:780}}>

                  {/* Column headers */}
                  <div style={{display:'flex',marginBottom:0}}>
                    {/* Agent col header */}
                    <div style={{width:210,flexShrink:0}}/>
                    {/* Phase bands */}
                    <div style={{flex:1,display:'flex'}}>
                      {/* Sales band */}
                      <div style={{display:'flex',gap:0,borderRadius:'8px 8px 0 0',overflow:'hidden',marginRight:4}}>
                        {DELIVERABLES.filter(d=>d.phase==='Sales').map((d,i)=>(
                          <div key={d.id} style={{width:72,background:C.teal+'22',borderTop:`2px solid ${C.teal}`,display:'flex',flexDirection:'column',alignItems:'center',padding:'6px 4px 8px',gap:6,
                            borderLeft: i===0 ? `1px solid ${C.teal}44` : 'none',
                            borderRight:`1px solid ${C.teal}44`,
                          }}>
                            <div style={{fontSize:9,fontWeight:700,color:C.teal,letterSpacing:'.05em'}}>SALES</div>
                            <div style={{fontSize:10,fontWeight:600,color:C.cloud,textAlign:'center',lineHeight:1.3,whiteSpace:'pre-line'}}>{DEL_SHORT[d.id]}</div>
                            <div style={{fontSize:9,color:C.fog}}>{delCounts[DELIVERABLES.indexOf(d)]}</div>
                          </div>
                        ))}
                      </div>
                      {/* Delivery band */}
                      <div style={{display:'flex',gap:0,borderRadius:'8px 8px 0 0',overflow:'hidden'}}>
                        {DELIVERABLES.filter(d=>d.phase==='Delivery').map((d,i,arr)=>(
                          <div key={d.id} style={{width:72,background:C.amber+'18',borderTop:`2px solid ${C.amber}`,display:'flex',flexDirection:'column',alignItems:'center',padding:'6px 4px 8px',gap:6,
                            borderLeft: i===0 ? `1px solid ${C.amber}44` : 'none',
                            borderRight:`1px solid ${C.amber}44`,
                          }}>
                            <div style={{fontSize:9,fontWeight:700,color:C.amber,letterSpacing:'.05em'}}>DELIVERY</div>
                            <div style={{fontSize:10,fontWeight:600,color:C.cloud,textAlign:'center',lineHeight:1.3,whiteSpace:'pre-line'}}>{DEL_SHORT[d.id]}</div>
                            <div style={{fontSize:9,color:C.fog}}>{delCounts[DELIVERABLES.indexOf(d)]}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Agent rows grouped by tier */}
                  {[1,2,3,4,5,6].map(tier=>{
                    const ta = AGENTS.filter(a=>a.tier===tier);
                    const tc = TIER_COLOR[tier];
                    return (
                      <div key={tier}>
                        {/* Tier divider row */}
                        <div style={{display:'flex',alignItems:'center',background:'rgba(6,14,28,0.72)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',borderTop:"1px solid rgba(255,255,255,0.07)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:'5px 0 5px 12px',marginTop:0}}>
                          <div style={{width:4,height:12,background:tc,borderRadius:2,marginRight:8,flexShrink:0}}/>
                          <span style={{fontSize:10,fontWeight:700,color:tc,textTransform:'uppercase',letterSpacing:'.07em',width:198}}>{TIER_LABELS[tier]}</span>
                          {DELIVERABLES.map(d=>{
                            const count = (deliverableMappings[d.id]||[]).filter(id=>ta.some(a=>a.id===id)).length;
                            return (
                              <div key={d.id} style={{width:72,display:'flex',justifyContent:'center',flexShrink:0}}>
                                {count>0 && <span style={{fontSize:9,color:tc,fontFamily:'DM Mono,monospace'}}>{count}/{ta.length}</span>}
                              </div>
                            );
                          })}
                        </div>

                        {/* Agent rows */}
                        {ta.map((agent,ri)=>{
                          const isLast = ri === ta.length-1;
                          return (
                            <div key={agent.id} style={{display:'flex',alignItems:'center',background: ri%2===0 ? 'rgba(255,255,255,0.025)' : 'rgba(255,255,255,0.015)',borderBottom:'1px solid rgba(255,255,255,0.04)',minHeight:44,transition:'background .15s'}}>
                              {/* Agent identity */}
                              <div style={{width:210,flexShrink:0,display:'flex',alignItems:'center',gap:9,padding:'8px 12px'}}>
                                <Avatar agent={agent} size={26}/>
                                <div style={{minWidth:0}}>
                                  <div style={{fontSize:12,fontWeight:600,color:C.white,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{agent.name}</div>
                                  <div style={{fontSize:9,color:C.slateLight,fontFamily:'DM Mono,monospace'}}>{agent.id} · {agent.model}</div>
                                </div>
                              </div>
                              {/* Cells */}
                              {DELIVERABLES.map(d=>{
                                const included = (deliverableMappings[d.id]||[]).includes(agent.id);
                                return (
                                  <div key={d.id} style={{width:72,display:'flex',justifyContent:'center',alignItems:'center',flexShrink:0}}>
                                    <MatrixCell
                                      included={included}
                                      tierColor={tc}
                                      onClick={()=>toggleCell(agent.id, d.id)}
                                    />
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{marginTop:14,fontSize:11,color:C.slateLight}}>
                Changes apply to all new engagements. Existing engagements are not affected.
              </div>
            </div>
          )}
        </div>{/* end scrollable left pane */}

        {/* Config panel */}
        {selectedAgent&&(
          <AgentConfigPanel
            agent={selectedAgent}
            config={agentConfigs?.[selectedAgent.id]}
            setAgentConfigs={setAgentConfigs}
            onClose={()=>setSelectedAgent(null)}
          />
        )}
      </div>
      );
    }

    // ── MarkdownView ──────────────────────────────────────────────────────────
    function MarkdownView({text,compact=false}) {
      if(!text) return null;
      const inline=(str)=>{
        const parts=str.split(/(\*\*[^*]+\*\*)/g);
        return parts.map((p,i)=>p.startsWith('**')&&p.endsWith('**')
          ?<strong key={i} style={{color:C.white,fontWeight:700}}>{p.slice(2,-2)}</strong>:p);
      };
      const nodes=[];let bullets=[];
      const flushBullets=(k)=>{
        if(!bullets.length)return;
        nodes.push(<ul key={k} style={{paddingLeft:18,margin:'6px 0 10px'}}>{bullets.map((b,i)=><li key={i} style={{color:C.cloud,fontSize:compact?11:12,lineHeight:1.6,marginBottom:2}}>{inline(b)}</li>)}</ul>);
        bullets=[];
      };
      text.split('\n').forEach((raw,idx)=>{
        const line=raw.trimEnd();
        if(line.startsWith('- ')||line.startsWith('* ')){bullets.push(line.slice(2));return;}
        flushBullets(`ul${idx}`);
        if(line.startsWith('# ')){
          nodes.push(<div key={idx} style={{fontFamily:'Fraunces,serif',fontSize:compact?17:22,fontWeight:700,color:C.white,margin:'18px 0 10px 0',lineHeight:1.2}}>{line.slice(2)}</div>);
        } else if(line.startsWith('## ')){
          nodes.push(<div key={idx} style={{fontSize:compact?12:14,fontWeight:700,color:C.teal,margin:'16px 0 6px',paddingBottom:5,borderBottom:`1px solid ${C.teal}33`}}>{line.slice(3)}</div>);
        } else if(line.startsWith('### ')){
          nodes.push(<div key={idx} style={{fontSize:compact?11:13,fontWeight:700,color:C.gold,margin:'12px 0 4px'}}>{line.slice(4)}</div>);
        } else if(line==='---'){
          nodes.push(<div key={idx} style={{borderTop:"1px solid rgba(255,255,255,0.07)",margin:'14px 0'}}/>);
        } else if(line===''){
          // spacing via paragraph margin
        } else if(/^\*?\*?(Client|Sector|Date):/.test(line)){
          nodes.push(<div key={idx} style={{fontSize:11,color:C.fog,fontFamily:'DM Mono,monospace',margin:'0 0 10px'}}>{line.replace(/\*\*/g,'')}</div>);
        } else {
          nodes.push(<p key={idx} style={{fontSize:compact?11:12,color:C.cloud,lineHeight:1.65,margin:'0 0 7px'}}>{inline(line)}</p>);
        }
      });
      flushBullets('ul-end');
      return <div>{nodes}</div>;
    }

    // ── ProcessView ───────────────────────────────────────────────────────────
    function ProcessView({feed}) {
      // Build a clean timeline from raw feed events
      const timeline=[];
      let curAgent=null,curOutput='',curInput='';
      feed.forEach(ev=>{
        if(ev.type==='agent_start'){
          if(curAgent) timeline.push({kind:'agent',agentId:curAgent,output:curOutput,input:curInput});
          curAgent=ev.agentId; curOutput=''; curInput=ev.content||'';
        } else if(ev.type==='agent_output'){
          curOutput=ev.content||'';
        } else if(ev.type==='agent_complete'){
          if(curAgent){timeline.push({kind:'agent',agentId:curAgent,output:curOutput,input:curInput});curAgent=null;curOutput='';curInput='';}
        } else if(ev.type==='gate_open'){
          if(curAgent){timeline.push({kind:'agent',agentId:curAgent,output:curOutput,input:curInput,running:true});curAgent=null;}
          timeline.push({kind:'gate',gateId:ev.gateId,ts:ev.ts});
        } else if(ev.type==='gate_verdict'){
          const g=timeline.slice().reverse().find(t=>t.kind==='gate'&&t.gateId===ev.gateId);
          if(g){g.verdict=ev.verdict;g.memo=ev.content;}
        } else if(ev.type==='engagement_complete'){
          timeline.push({kind:'complete',ts:ev.ts});
        } else if(ev.type==='error'){
          timeline.push({kind:'error',content:ev.content,ts:ev.ts});
        } else if(ev.type==='info'){
          timeline.push({kind:'info',content:ev.content,ts:ev.ts});
        }
      });
      if(curAgent) timeline.push({kind:'agent',agentId:curAgent,output:curOutput,input:curInput,running:true});
      if(!timeline.length) return <div style={{textAlign:'center',color:C.slateLight,padding:'60px 0',fontSize:13}}>Run the engagement to see the process timeline.</div>;
      const VC={PASS:C.green,CONDITIONAL:C.amber,REWORK:C.red};
      return (
        <div style={{flex:1,overflowY:'auto',padding:'20px 28px'}}>
          {timeline.map((item,idx)=>{
            const isLast=idx===timeline.length-1;
            if(item.kind==='agent'){
              const agent=AGENTS.find(a=>a.id===item.agentId);
              const color=TIER_COLOR[agent?.tier]||C.fog;
              const fakeAgent=agent||{id:item.agentId,tier:6};
              return (
                <div key={idx} style={{display:'flex',gap:14,marginBottom:0}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                    <Avatar agent={fakeAgent} size={34} active={item.running}/>
                    {!isLast&&<div style={{width:2,flex:1,minHeight:24,background:C.slateMid,margin:'4px 0'}}/>}
                  </div>
                  <div style={{flex:1,paddingBottom:18}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:700,color}}>{agent?.name||item.agentId}</span>
                      <span style={{fontSize:10,color:C.slateLight,fontFamily:'DM Mono,monospace'}}>Tier {agent?.tier}</span>
                      {item.running&&<span className="pulse" style={{fontSize:10,color:C.teal}}>● running</span>}
                    </div>
                    <div style={{fontSize:11,color:C.fog,marginBottom:6,lineHeight:1.4}}>{agent?.description}</div>
                    {item.output&&(
                      <div style={{...GL.card,border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:'10px 14px',fontSize:11,color:C.cloud,lineHeight:1.6,maxHeight:140,overflowY:'auto'}}>
                        {item.output.slice(0,400)}{item.output.length>400?'…':''}
                      </div>
                    )}
                  </div>
                </div>
              );
            }
            if(item.kind==='gate'){
              const gObj=GATES.find(g=>g.id===item.gateId);
              const color=item.verdict?VC[item.verdict]:C.gold;
              return (
                <div key={idx} style={{display:'flex',gap:14,marginBottom:0}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                    <div style={{width:34,height:34,borderRadius:9,background:color+'22',border:`2px solid ${color}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <Icon name="gate" size={15} color={color}/>
                    </div>
                    {!isLast&&<div style={{width:2,flex:1,minHeight:24,background:C.slateMid,margin:'4px 0'}}/>}
                  </div>
                  <div style={{flex:1,paddingBottom:18}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:700,color}}>{gObj?.name||item.gateId}</span>
                      {item.verdict&&<Pill label={item.verdict} color={color}/>}
                    </div>
                    <div style={{fontSize:11,color:C.fog,marginBottom:item.memo?6:0}}>{gObj?.description}</div>
                    {item.memo&&<div style={{fontSize:11,color:C.cloud,fontStyle:'italic'}}>"{item.memo}"</div>}
                  </div>
                </div>
              );
            }
            if(item.kind==='complete'){
              return (
                <div key={idx} style={{display:'flex',gap:14}}>
                  <div style={{width:34,height:34,borderRadius:9,background:C.green+'22',border:`2px solid ${C.green}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <Icon name="check" size={15} color={C.green}/>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:C.green,paddingTop:9}}>Engagement Complete</div>
                </div>
              );
            }
            if(item.kind==='info'){
              return (
                <div key={idx} style={{display:'flex',gap:14,marginBottom:0}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                    <div style={{width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="dot" size={8} color={C.slateLight}/></div>
                    {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:C.slateMid,margin:'0 0'}}/>}
                  </div>
                  <div style={{fontSize:11,color:C.fog,paddingTop:10,paddingBottom:12}}>{item.content}</div>
                </div>
              );
            }
            return null;
          })}
        </div>
      );
    }

    // ── ViewRunner ────────────────────────────────────────────────────────────
    function ViewRunner({activeEng, running, runStatus, feed, feedRef, activeAgents, runEngagement, stopEngagement, setShowContext, setView, gateArtefacts, context}) {
      const [tab,setTab]=useState('feed');
      const sbg={running:C.teal+'18',gate:C.gold+'18',complete:C.green+'18',error:C.red+'18'};
      const artefactKeys=Object.keys(gateArtefacts||{});
      const tabSt=(active)=>({
        padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
        background:active?C.slateMid:'transparent',color:active?C.white:C.fog,transition:'all .15s',
      });

      // Download helpers (same logic as ViewGate)
      const [dlLoading,setDlLoading]=useState(null);
      const dlMd=(text,label)=>{
        const slug=label.toLowerCase().replace(/[^a-z0-9]+/g,'-');
        const blob=new Blob([text],{type:'text/markdown'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download=slug+'.md';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      };
      const dlFmt=async(fmt,text,label)=>{
        if(dlLoading)return;setDlLoading(fmt+label);
        try{
          const res=await fetch(`/api/generate-${fmt}`,{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({content:text,title:label,client:context?.client||'',sector:context?.sector||''})});
          if(!res.ok)throw new Error((await res.json().catch(()=>({}))).error||res.statusText);
          const blob=await res.blob();const url=URL.createObjectURL(blob);
          const a=document.createElement('a');const slug=label.toLowerCase().replace(/[^a-z0-9]+/g,'-');
          a.href=url;a.download=slug+'.'+fmt;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
        }catch(err){alert('Download failed: '+err.message);}
        finally{setDlLoading(null);}
      };

        <div className="fadeIn" style={{display:'flex',height:'100%',overflow:'hidden'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

              {activeEng?(
                <>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14,color:C.white}}>{activeEng.client}</div>
                    <div style={{fontSize:10,color:C.fog,fontFamily:'DM Mono,monospace'}}>{activeEng.id} · {DELIVERABLES.find(d=>d.id===activeEng.deliverable)?.label||''}</div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    {!running&&runStatus!=='gate'&&<button onClick={()=>runEngagement(activeEng)} style={btnSt(C.teal)}><Icon name="runner" size={13}/> {runStatus==='complete'?'Re-run':'Run'}</button>}
                    {running&&<button onClick={stopEngagement} style={btnSt(C.red)}>Stop</button>}

                  </div>
                </>

                <div style={{color:C.fog,fontSize:13}}>No active engagement — create one to get started.</div>

            }).filter(Boolean)}
          </div>
        </div>
      );
    }

    // ── ViewGate ──────────────────────────────────────────────────────────────

                      <button onClick={e=>{e.stopPropagation();downloadDoc('docx');}} style={{...btnSt(C.tealDim||'#0A5857'),padding:'5px 10px',fontSize:11,opacity:docLoading==='docx'?.6:1}}>
                        <Icon name="file" size={11}/> {docLoading==='docx'?'…':'.docx'}
                      </button>
                      <button onClick={e=>{e.stopPropagation();downloadDoc('pptx');}} style={{...btnSt('#3D2F6E'),padding:'5px 10px',fontSize:11,opacity:docLoading==='pptx'?.6:1}}>
                        <Icon name="doc" size={11}/> {docLoading==='pptx'?'…':'.pptx'}

                      <Icon name="chevron" size={14} color={C.fog} style={{transform:previewExpanded?'rotate(90deg)':'rotate(-90deg)',transition:'transform .2s'}}/>

              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {gateHistory.map((gr,i)=>{
                  const g=GATES.find(x=>x.id===gr.gateId);
                  return (
                    <div key={i} style={{...GL.card,border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:'10px 16px',display:'flex',alignItems:'center',gap:12}}>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:12,color:C.cloud,fontWeight:600}}>{gr.gateId}</span>
                      <span style={{fontSize:12,color:C.fog}}>{g?.name}</span>
                      <Pill label={gr.verdict} color={VC[gr.verdict]||C.fog}/>
