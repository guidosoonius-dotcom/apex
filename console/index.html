    // ── Sidebar ───────────────────────────────────────────────────────────────
    // ── ViewLibrary ───────────────────────────────────────────────────────────
    function ViewLibrary({context}) {
      const [items,    setItems]    = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [search,   setSearch]   = useState('');
      const [fVerdict, setFVerdict] = useState('');
      const [fClient,  setFClient]  = useState('');
      const [expanded, setExpanded] = useState({});
      const [dlLoading,setDlLoading]= useState(null);
      const [selected, setSelected] = useState(null); // full content for detail panel

      const load = () => {
        setLoading(true);
        fetch('/api/deliverables')
          .then(r=>r.json())
          .then(data=>{ setItems(Array.isArray(data)?data:[]); setLoading(false); })
          .catch(()=>setLoading(false));
      };
      useEffect(load, []);

      const deleteItem = async (id) => {
        if(!window.confirm('Delete this deliverable from the library?')) return;
        await fetch(`/api/deliverables/${encodeURIComponent(id)}`,{method:'DELETE'});
        setItems(prev=>prev.filter(x=>x.id!==id));
        if(selected?.id===id) setSelected(null);
      };

      // Fetch full content when a card is opened for detail view
      const openDetail = (item) => {
        // Content may be truncated in listing — fetch full record
        fetch(`/api/deliverables?q=${encodeURIComponent(item.id)}`)
          .then(r=>r.json())
          .then(rows=>{ const full=rows.find(r=>r.id===item.id); setSelected(full||item); })
          .catch(()=>setSelected(item));
      };

      const dlMd=(text,label)=>{
        const blob=new Blob([text],{type:'text/markdown'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=label.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.md';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      };
      const dlFmt=async(fmt,text,label,client,sector)=>{
        if(dlLoading)return; setDlLoading(fmt+label);
        try{
          const res=await fetch(`/api/generate-${fmt}`,{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({content:text,title:label,client:client||'',sector:sector||''})});
          if(!res.ok)throw new Error((await res.json().catch(()=>({}))).error||res.statusText);
          const blob=await res.blob();const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url;a.download=label.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.'+fmt;
          document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
        }catch(err){alert('Download failed: '+err.message);}
        finally{setDlLoading(null);}
      };

      const VC={PASS:C.green,CONDITIONAL:C.amber,REWORK:C.red};
      const clients=[...new Set(items.map(i=>i.client).filter(Boolean))];

      const filtered=items.filter(it=>{
        const ms=!search||[it.label,it.client,it.sector,it.deliverable_type]
          .some(v=>v?.toLowerCase().includes(search.toLowerCase()));
        const mv=!fVerdict||it.verdict===fVerdict;
        const mc=!fClient ||it.client===fClient;
        return ms&&mv&&mc;
      });

      const chipSt=(active,color=C.teal)=>({
        padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',
        fontFamily:'DM Mono,monospace',letterSpacing:'.04em',border:'none',transition:'all .15s',
        background: active ? color+'33' : 'rgba(255,255,255,0.06)',
        color:      active ? color      : C.fog,
        boxShadow:  active ? `0 0 0 1px ${color}55` : 'none',
      });

      return (
        <div className="fadeIn" style={{display:'flex',height:'100%',overflow:'hidden'}}>

          {/* ── Main panel ── */}
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

            {/* Header */}
            <div style={{padding:'20px 28px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)',flexShrink:0,
              background:'rgba(6,6,8,0.70)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
                <div>
                  <div style={{fontSize:10,fontWeight:600,color:C.teal,textTransform:'uppercase',
                    letterSpacing:'.10em',fontFamily:'DM Mono,monospace',marginBottom:6}}>Deliverable Library</div>
                  <h1 style={{fontFamily:'Fraunces,serif',fontSize:24,fontWeight:700,
                    color:C.white,letterSpacing:'-.02em',lineHeight:1}}>
                    {filtered.length} deliverable{filtered.length!==1?'s':''}
                  </h1>
                </div>
                <button onClick={load} style={{...btnSt(C.slateMid),padding:'7px 14px',fontSize:12}}>
                  <Icon name="rework" size={12}/> Refresh
                </button>
              </div>

              {/* Search + filters */}
              <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                <div style={{position:'relative',flex:'1 1 200px',maxWidth:320}}>
                  <Icon name="search" size={13} color={C.fog}
                    style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}/>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Search deliverables…"
                    style={{...inputSt,paddingLeft:32,fontSize:12,padding:'8px 12px 8px 32px'}}/>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <button style={chipSt(!fVerdict)} onClick={()=>setFVerdict('')}>All</button>
                  {['PASS','CONDITIONAL'].map(v=>(
                    <button key={v} style={chipSt(fVerdict===v,VC[v])} onClick={()=>setFVerdict(p=>p===v?'':v)}>{v}</button>
                  ))}
                  {clients.length>0&&(
                    <select value={fClient} onChange={e=>setFClient(e.target.value)}
                      style={{...inputSt,padding:'5px 10px',fontSize:11,width:'auto',minWidth:120,fontFamily:'DM Mono,monospace'}}>
                      <option value="">All clients</option>
                      {clients.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  )}
                </div>
              </div>
            </div>

            {/* List */}
            <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
              {loading?(
                <div style={{textAlign:'center',padding:'80px 0',color:C.fog,fontSize:13}}>
                  <span className="spin" style={{display:'inline-flex',marginBottom:14}}><Icon name="spinner" size={20} color={C.teal}/></span>
                  <div>Loading library…</div>
                </div>
              ):filtered.length===0?(
                <div style={{textAlign:'center',padding:'80px 0'}}>
                  <div style={{width:52,height:52,borderRadius:14,background:'rgba(255,255,255,0.04)',
                    border:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'center',
                    justifyContent:'center',margin:'0 auto 16px'}}>
                    <Icon name="archive" size={22} color={C.slateLight}/>
                  </div>
                  <div style={{fontSize:15,fontWeight:600,color:C.cloud,marginBottom:6}}>
                    {search||fVerdict||fClient?'No matches':'Library is empty'}
                  </div>
                  <div style={{fontSize:12,color:C.fog}}>
                    {search||fVerdict||fClient?'Try adjusting your filters.':'Deliverables are saved here when a gate is passed.'}
                  </div>
                </div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {filtered.map(item=>{
                    const isOpen=expanded[item.id];
                    const vColor=VC[item.verdict]||C.fog;
                    const isActive=selected?.id===item.id;
                    return (
                      <div key={item.id} className={`gl-card gb${isActive?' ':' '}`}
                        style={{...GL.card,borderRadius:14,overflow:'hidden',
                          border:isActive?`1px solid ${C.teal}55`:'1px solid rgba(255,255,255,0.08)',
                          boxShadow:isActive?`0 4px 24px rgba(14,124,123,0.18),inset 0 1px 0 rgba(255,255,255,0.10)`:GL.card.boxShadow}}>

                        {/* Card header */}
                        <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',
                          borderBottom:isOpen?'1px solid rgba(255,255,255,0.06)':'none',cursor:'pointer'}}
                          onClick={()=>setExpanded(p=>({...p,[item.id]:!p[item.id]}))}>

                          {/* Icon */}
                          <div style={{width:36,height:36,borderRadius:10,flexShrink:0,
                            background:vColor+'18',border:`1px solid ${vColor}44`,
                            display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <Icon name="doc" size={15} color={vColor}/>
                          </div>

                          {/* Title block */}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:700,fontSize:13,color:C.white,marginBottom:3,
                              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                              {item.label}
                            </div>
                            <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                              {item.client&&<span style={{fontSize:11,color:C.cloud}}>{item.client}</span>}
                              {item.sector&&<span style={{fontSize:11,color:C.fog}}>· {item.sector}</span>}
                              {item.deliverable_type&&<Pill label={item.deliverable_type} color={C.teal}/>}
                            </div>
                          </div>

                          {/* Meta */}
                          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                            {item.word_count>0&&(
                              <span style={{fontSize:10,color:C.slateLight,fontFamily:'DM Mono,monospace'}}>
                                {item.word_count.toLocaleString()} w
                              </span>
                            )}
                            <Pill label={item.gate_id} color={C.gold}/>
                            {item.verdict&&<Pill label={item.verdict} color={vColor}/>}
                            <span style={{fontSize:10,color:'rgba(255,255,255,0.25)',fontFamily:'DM Mono,monospace'}}>
                              {item.created_at?.slice(0,10)}
                            </span>

                            {/* Action buttons */}
                            <div style={{display:'flex',gap:4}} onClick={e=>e.stopPropagation()}>
                              <button title="View full content"
                                onClick={()=>{ isActive?setSelected(null):openDetail(item); }}
                                style={{...btnSt(isActive?C.teal:C.slateMid),padding:'4px 9px',fontSize:10}}>
                                {isActive?'Close':'View'}
                              </button>
                              <button onClick={e=>{e.stopPropagation();deleteItem(item.id);}}
                                title="Delete from library"
                                style={{background:'none',border:'1px solid rgba(229,82,82,0.30)',
                                  borderRadius:7,padding:'4px 8px',cursor:'pointer',color:C.red,fontSize:11,
                                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                                <Icon name="close" size={12} color={C.red}/>
                              </button>
                            </div>
                            <Icon name="chevron" size={13} color={C.fog}
                              style={{transform:isOpen?'rotate(90deg)':'rotate(-90deg)',transition:'transform .2s'}}/>
                          </div>
                        </div>

                        {/* Inline preview */}
                        {isOpen&&(
                          <div style={{padding:'14px 18px',maxHeight:220,overflowY:'auto',
                            borderTop:'1px solid rgba(255,255,255,0.05)'}}>
                            <div style={{fontSize:11,color:C.cloud,lineHeight:1.65,
                              fontFamily:'DM Mono,monospace',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                              {item.preview||item.content}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* ── Detail panel ── */}
          {selected&&(
            <div style={{width:440,borderLeft:'1px solid rgba(255,255,255,0.07)',
              display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0,
              background:'rgba(6,6,8,0.65)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)'}}>

              {/* Panel header */}
              <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)',
                flexShrink:0,display:'flex',alignItems:'flex-start',gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:10,color:C.teal,fontFamily:'DM Mono,monospace',
                    textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>
                    {selected.gate_id} · {selected.deliverable_type}
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:C.white,lineHeight:1.3,
                    marginBottom:6,wordBreak:'break-word'}}>{selected.label}</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                    {selected.client&&<span style={{fontSize:11,color:C.cloud}}>{selected.client}</span>}
                    {selected.sector&&<span style={{fontSize:11,color:C.fog}}>· {selected.sector}</span>}
                    {selected.verdict&&<Pill label={selected.verdict} color={VC[selected.verdict]||C.fog}/>}
                  </div>
                  <div style={{marginTop:6,fontSize:10,color:'rgba(255,255,255,0.28)',
                    fontFamily:'DM Mono,monospace'}}>
                    {selected.word_count?.toLocaleString()||0} words · {selected.created_at?.slice(0,16).replace('T',' ')}
                  </div>
                </div>
                <button onClick={()=>setSelected(null)}
                  style={{background:'none',border:'none',cursor:'pointer',color:C.fog,padding:4,flexShrink:0}}>
                  <Icon name="close" size={16}/>
                </button>
              </div>

              {/* Download bar */}
              <div style={{padding:'10px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)',
                flexShrink:0,display:'flex',gap:6,alignItems:'center'}}>
                <span style={{fontSize:10,color:C.fog,fontFamily:'DM Mono,monospace',marginRight:4}}>Export:</span>
                <button onClick={()=>dlMd(selected.content,selected.label)}
                  style={{...btnSt(C.slateMid),padding:'5px 10px',fontSize:11}}>.md</button>
                <button onClick={()=>dlFmt('docx',selected.content,selected.label,selected.client,selected.sector)}
                  style={{...btnSt(C.tealDim||'#0A5857'),padding:'5px 10px',fontSize:11,
                    opacity:dlLoading===('docx'+selected.label)?.6:1}}>
                  {dlLoading===('docx'+selected.label)?'…':'.docx'}
                </button>
                <button onClick={()=>dlFmt('pptx',selected.content,selected.label,selected.client,selected.sector)}
                  style={{...btnSt('#3D2F6E'),padding:'5px 10px',fontSize:11,
                    opacity:dlLoading===('pptx'+selected.label)?.6:1}}>
                  {dlLoading===('pptx'+selected.label)?'…':'.pptx'}
                </button>
              </div>

              {/* Full content */}
              <div style={{flex:1,overflowY:'auto',padding:'18px 20px'}}>
                <MarkdownView text={selected.content}/>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Sidebar({view, setView, engagements, activeEngId, setActiveEngId, setShowModal, pendingGate, apiKey, setApiKey, showKeyInput, setShowKeyInput}) {
      const NAV=[
        {id:'dashboard',label:'Dashboard',         icon:'home'},
        {id:'agents',   label:'Agents',            icon:'agents'},
        {id:'runner',   label:'Runner',            icon:'runner'},
        {id:'gate',     label:'Gate Review',       icon:'gate'},
        {id:'library',  label:'Deliverable Library',icon:'archive'},
      ];

        display:'flex',alignItems:'center',gap:10,padding:'9px 14px',borderRadius:9,
        cursor:'pointer',color:active?C.white:C.fog,
        background:active?'rgba(14,124,123,0.20)':'transparent',
        border:active?'1px solid rgba(14,124,123,0.30)':'1px solid transparent',
        fontSize:13,fontWeight:active?600:400,transition:'all .15s',margin:'1px 8px',userSelect:'none',
        boxShadow:active?'0 2px 12px rgba(14,124,123,0.20)':'none',

          <div style={{padding:'24px 20px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>

            </div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.25)',fontFamily:'DM Mono,monospace',letterSpacing:'.04em'}}>v3.0 · 21 agents</div>
          </div>
          {/* New Engagement */}
          <div style={{padding:'14px 12px 6px'}}>

                style={{...inputSt,fontSize:11,padding:'7px 10px',fontFamily:'DM Mono,monospace'}}/>
            ):(
              <div onClick={()=>setShowKeyInput(true)} style={{fontSize:11,color:apiKey?C.green:C.fog,cursor:'pointer',fontFamily:'DM Mono,monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6,padding:'6px 8px',borderRadius:7,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)'}}>
                <Icon name="key" size={11} color={apiKey?C.green:C.fog}/>
                {apiKey?`sk-ant-…${apiKey.slice(-6)}`:'Click to set'}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── APEXConsole (root — only state lives here) ────────────────────────────
    function APEXConsole() {
      const [view, setView]               = useState('dashboard');
      const [showModal, setShowModal]     = useState(false);
      const [showContext, setShowContext] = useState(false);
      const [apiKey, setApiKey]           = useState(()=>localStorage.getItem('apex_api_key')||'');
      const [showKeyInput, setShowKeyInput] = useState(false);
      const [engagements, setEngagements] = useState([]);
      const [activeEngId, setActiveEngId] = useState(null);
      const [feed, setFeed]               = useState([]);
      const [running, setRunning]         = useState(false);
      const [runStatus, setRunStatus]     = useState('idle');
      const [activeAgents, setActiveAgents] = useState(new Set());
      const [context, setContext]         = useState(null);
      const [pendingGate, setPendingGate] = useState(null);
      const [gateMemo, setGateMemo]       = useState('');
      const [gateHistory, setGateHistory] = useState([]);
      const [draft, setDraft]             = useState({client:'',sector:'',brief:'',deliverable:'',agents:[],files:[]});
      const [deliverableMappings, setDeliverableMappings] = useState(()=>{
        const m={}; DELIVERABLES.forEach(d=>{m[d.id]=[...d.agents];}); return m;
      });
      const [dragOver, setDragOver]       = useState(false);
      const [gateArtefacts, setGateArtefacts] = useState({}); // {[gateId]: {label,content,verdict,ts}}
      const [agentConfigs, setAgentConfigs]   = useState(()=>{
        try{ return JSON.parse(localStorage.getItem('apex_agent_configs')||'{}'); }
        catch{ return {}; }
      });

      const feedRef        = useRef(null);
      const agentConfigsRef = useRef(agentConfigs);
      useEffect(()=>{ agentConfigsRef.current = agentConfigs; },[agentConfigs]);
      const abortRef       = useRef(null);
      const gateResolveRef = useRef(null);
      const docRef         = useRef({});  // full agent outputs for deliverable assembly

      // ── DB helpers (fire-and-forget, never block the UI) ───────────────────
      const dbSaveEngagement = useCallback((eng) => {
        fetch('/api/engagements', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(eng),
        }).catch(()=>{});
      }, []);

      const dbUpdateEngStatus = useCallback((id, status) => {
        fetch('/api/engagements', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({id, status}),
        }).catch(()=>{});
      }, []);

      const dbSaveDeliverable = useCallback((payload) => {
        fetch('/api/deliverables', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload),
        }).catch(()=>{});
      }, []);

      // Load engagements from DB on first mount
      useEffect(()=>{
        fetch('/api/engagements')
          .then(r=>r.json())
          .then(rows=>{
            if(!Array.isArray(rows)||rows.length===0) return;
            setEngagements(rows.map(r=>({
              id:r.id, client:r.client, sector:r.sector,
              deliverable:r.deliverable, status:r.status,
              brief:r.brief,
              agents: (() => { try { return JSON.parse(r.agents||'[]'); } catch{ return []; } })(),
              createdAt:r.created_at,
            })));
          })
          .catch(()=>{});
      },[]);

      useEffect(()=>{
        if(feedRef.current) feedRef.current.scrollTop=feedRef.current.scrollHeight;
      },[feed]);

      const activeEng=engagements.find(e=>e.id===activeEngId);

      const addFeed=useCallback((type,agentId,content,extra={})=>{
        setFeed(prev=>[...prev,{id:`${Date.now()}-${Math.random().toString(36).slice(2)}`,type,agentId,content,ts:Date.now(),...extra}]);
      },[]);

      const callAgent=useCallback(async(agentId,systemPrompt,userMsg)=>{
        const key=apiKey||localStorage.getItem('apex_api_key');
        if(!key) throw new Error('No API key set — click the key icon in the sidebar.');
        const agent=AGENTS.find(a=>a.id===agentId);
        const cfg=agentConfigsRef.current[agentId]||{};
        const modelKey=(cfg.model||agent?.model||'sonnet')==='opus'?'claude-opus-4-6':'claude-sonnet-4-6';
        const maxTok=cfg.maxTokens||2048;
        addFeed('agent_start',agentId,userMsg.slice(0,100)+(userMsg.length>100?'…':''));
        setActiveAgents(prev=>new Set([...prev,agentId]));
        const res=await fetch('/api/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
          body:JSON.stringify({model:modelKey,max_tokens:maxTok,system:systemPrompt,messages:[{role:'user',content:userMsg}]}),
          signal:abortRef.current?.signal,
        });
        if(!res.ok){const err=await res.json().catch(()=>({error:{message:res.statusText}}));throw new Error(err?.error?.message||`HTTP ${res.status}`);}
        const data=await res.json();
        const output=data.content?.[0]?.text||'';
        addFeed('agent_output',agentId,output);
        addFeed('agent_complete',agentId,`${agent?.name||agentId} complete.`);
        setActiveAgents(prev=>{const s=new Set(prev);s.delete(agentId);return s;});
        return output;
      },[apiKey,addFeed]);

      const openGate=useCallback((gateId,ctx)=>{
        const gate=GATES.find(g=>g.id===gateId);
        addFeed('gate_open','ep',`${gate?.name||gateId} opened — EP review required.`,{gateId});
        setRunStatus('gate');
        setPendingGate({gateId,gate,ctx});
        setGateMemo('');
        setView('gate');
        return new Promise(resolve=>{gateResolveRef.current=resolve;});
      },[addFeed]);

      const submitGate=useCallback((verdict)=>{
        if(!pendingGate)return;
        const{gateId,gate}=pendingGate;
        const memo=gateMemo;
        addFeed('gate_verdict','ep',`${gate?.name||gateId}: ${verdict}${memo?' — '+memo:''}`,{verdict});
        const entry={gateId,verdict,memo,ts:new Date().toISOString()};
        setGateHistory(prev=>[...prev,entry]);
        setContext(prev=>({...prev,quality_gates:{...(prev?.quality_gates||{}),[gateId]:entry}}));
        // Persist the deliverable so it remains visible in Runner after the gate closes
        if(verdict!=='REWORK'&&pendingGate.ctx?.preview){
          const artefact={
            label:pendingGate.ctx.previewLabel||gateId,
            content:pendingGate.ctx.preview,
            verdict, ts:new Date().toISOString(),
          };
          setGateArtefacts(prev=>({...prev,[gateId]:artefact}));
          // Save to deliverable library DB
          dbSaveDeliverable({
            id:`${pendingGate.ctx.engagement_id||'eng'}-${gateId}-${Date.now()}`,
            engagement_id: pendingGate.ctx.engagement_id||'',
            gate_id:       gateId,
            label:         artefact.label,
            content:       artefact.content,
            verdict:       verdict,
            client:        pendingGate.ctx.client||'',
            sector:        pendingGate.ctx.sector||'',
            deliverable_type: pendingGate.ctx.engagement_type||'',
          });
        }
        setPendingGate(null);
        setGateMemo('');
        if(verdict==='REWORK'){
          setRunStatus('idle');
          addFeed('info',null,'Engagement paused for rework. Re-run when ready.');
          gateResolveRef.current?.('REWORK');
        }else{
          setRunStatus('running');
          setView('runner');
          gateResolveRef.current?.(verdict);
        }
        gateResolveRef.current=null;
      },[pendingGate,gateMemo,addFeed]);

      const runEngagement=useCallback(async(eng)=>{
        if(running)return;
        setRunning(true);setRunStatus('running');
        setFeed([]);setActiveAgents(new Set());setGateHistory([]);setContext(null);
        docRef.current={};
        setGateArtefacts({});
        setView('runner');
        abortRef.current=new AbortController();
        const deliverable=DELIVERABLES.find(d=>d.id===eng.deliverable);
        if(!deliverable){addFeed('error',null,'No deliverable selected.');setRunning(false);setRunStatus('error');return;}
        const seq = eng.agents && eng.agents.length>0 ? eng.agents : deliverable.agents;
        const ctx={engagement_id:eng.id,client:eng.client,sector:eng.sector||'General',brief:eng.brief,engagement_type:deliverable.label,artefacts:{},quality_gates:{},flags:[]};
        setContext(ctx);
        const makeSystem=id=>{
          const a=AGENTS.find(x=>x.id===id);
          const cfg=agentConfigsRef.current[id]||{};
          const base=`You are the APEX ${a?.name||id} — an agent within an AI-native strategy consulting firm.\n\nEngagementContext:\n${JSON.stringify(ctx,null,2)}\n\nProduce structured, hypothesis-driven consulting output. Use clear headings.`;
          return cfg.customInstructions?.trim()?`${base}\n\n## Custom Instructions\n${cfg.customInstructions.trim()}`:base;
        };
        // Build task prompt — includes FULL outputs of all prior agents so each
        // subsequent agent (especially EM, DP) can actually build on prior work.
        const makeTask=(id,i,total)=>{
          const a=AGENTS.find(x=>x.id===id);
          const priorBlocks=seq.slice(0,i)
            .filter(pid=>docRef.current[pid])
            .map(pid=>{const pa=AGENTS.find(x=>x.id===pid);return`### ${pa?.name||pid}\n\n${docRef.current[pid]}`;})
            .join('\n\n---\n\n');
          const priorSection=priorBlocks
            ?`\n\n## Prior Agent Outputs — build on these, do not repeat them\n\n${priorBlocks}\n\n---\n\n`
            :'\n\nYou are the first agent in this sequence.\n\n';
          return`CLIENT: ${eng.client} | SECTOR: ${eng.sector||'General'}\nDELIVERABLE: ${deliverable.label} (agent ${i+1}/${total})\nBRIEF: ${eng.brief}${priorSection}Produce your ${a?.name||id} output now. Use clear headings. Be specific to this client and brief.`;
        };
        // Final synthesis: one LLM call that reads ALL agent outputs and produces
        // a single, polished, client-ready document — NOT a concatenation of sections.
        const synthesiseDoc=async()=>{
          const rawBlocks=seq.filter(id=>docRef.current[id])
            .map(id=>{const a=AGENTS.find(x=>x.id===id);return`### ${a?.name||id}\n\n${docRef.current[id]}`;})
            .join('\n\n---\n\n');
          const synthSystem=`You are a senior partner at an AI-native strategy consulting firm producing the definitive, client-ready ${deliverable.label} for ${eng.client}.

You have received specialist research and analysis from multiple expert agents. Your job is to synthesise — not summarise — all inputs into ONE coherent, authoritative client document.

Rules:
- NEVER mention agent names, internal processes, or that AI was involved in production
- Write entirely in the consulting firm's voice, speaking directly to the client
- Open with an Executive Summary (≤1 page) — busy executives read nothing else
- Structure: Executive Summary → Context & Framing → Key Findings → Strategic Implications → Recommendations → Immediate Next Steps
- Every paragraph must advance the core argument — remove anything that does not
- Write in authoritative, jargon-free prose; if a word can be simpler, use it
- Be specific: name the client, reference their sector, their brief, their situation
- Recommendations must be concrete and actionable, not generic
- Confidence and decisiveness in tone — consulting firms do not hedge unnecessarily

Engagement context:
${JSON.stringify({client:ctx.client,sector:ctx.sector,engagement_type:ctx.engagement_type,brief:ctx.brief},null,2)}`;
          const synthTask=`Produce the complete, final ${deliverable.label} for ${eng.client}.\n\nSynthesise the following specialist inputs into one polished client document:\n\n${rawBlocks}\n\nWrite the final document now.`;
          addFeed('agent_start','dp','Synthesising final client deliverable…');
          const finalContent=await callAgent('dp',synthSystem,synthTask);
          addFeed('agent_done','dp','Final deliverable ready');
          return`# ${deliverable.label}\n\n**Client:** ${eng.client}  |  **Sector:** ${eng.sector||'General'}  |  **Date:** ${new Date().toLocaleDateString()}\n\n---\n\n${finalContent}`;
        };
        try{
          addFeed('info','md',`Engagement ${eng.id} initiated — ${deliverable.label} · ${seq.length} agents`);
          for(let i=0;i<seq.length;i++){
            if(abortRef.current?.signal.aborted)break;
            const agentId=seq[i];
            // EDA → Hypothesis Gate (H): review engagement design before analysis
            if(agentId==='eda'&&i<seq.length-1){
              const out=await callAgent(agentId,makeSystem(agentId),makeTask(agentId,i,seq.length));
              docRef.current[agentId]=out;
              ctx.artefacts[`${agentId}_output`]=out.slice(0,600);setContext({...ctx});
              const v=await openGate('H',{...ctx,preview:out,previewLabel:'Engagement Design & Hypothesis'});
              if(v==='REWORK')break;
              continue;
            }
            // ISA → Insight Gate (G1): run ISA first, then review the insight memo
            if(agentId==='isa'){
              const out=await callAgent(agentId,makeSystem(agentId),makeTask(agentId,i,seq.length));
              docRef.current[agentId]=out;
              ctx.artefacts[`${agentId}_output`]=out.slice(0,600);setContext({...ctx});
              const v=await openGate('G1',{...ctx,preview:out,previewLabel:'Strategic Insight Memo'});
              if(v==='REWORK')break;
              continue;
            }
            const out=await callAgent(agentId,makeSystem(agentId),makeTask(agentId,i,seq.length));
            docRef.current[agentId]=out;
            ctx.artefacts[`${agentId}_output`]=out.slice(0,600);setContext({...ctx});
          }
          if(!abortRef.current?.signal.aborted){
            const fullDoc=await synthesiseDoc();
            const v=await openGate('G3',{...ctx,preview:fullDoc,previewLabel:deliverable.label});
            if(v!=='REWORK'){
              addFeed('engagement_complete',null,`Engagement ${eng.id} complete — ${deliverable.label}`);
              setRunStatus('complete');
              setEngagements(prev=>prev.map(e=>e.id===eng.id?{...e,status:'complete'}:e));
              dbUpdateEngStatus(eng.id,'complete');
            }
          }
        }catch(err){
          if(err.name!=='AbortError'){addFeed('error',null,`Error: ${err.message}`);setRunStatus('error');setEngagements(prev=>prev.map(e=>e.id===eng.id?{...e,status:'error'}:e));dbUpdateEngStatus(eng.id,'error');}
        }finally{setRunning(false);setActiveAgents(new Set());}
      },[running,callAgent,openGate,addFeed]);

      const launchEngagement=()=>{
        if(!draft.client||!draft.brief||!draft.deliverable)return;
        const eng={
          id:'ENG-'+Date.now().toString(36).toUpperCase().slice(-6),
          client:draft.client, sector:draft.sector, brief:draft.brief,
          deliverable:draft.deliverable,
          agents:draft.agents.length>0 ? draft.agents : (DELIVERABLES.find(d=>d.id===draft.deliverable)?.agents||[]),
          files:draft.files, status:'running', createdAt:new Date().toISOString(),
        };
        setEngagements(prev=>[eng,...prev]);
        setActiveEngId(eng.id);
        setShowModal(false);
        setDraft({client:'',sector:'',brief:'',deliverable:'',agents:[],files:[]});
        dbSaveEngagement(eng);
        runEngagement(eng);
      };

      const handleDrop=(e)=>{
        e.preventDefault();setDragOver(false);
        const files=Array.from(e.dataTransfer.files).map(f=>({name:f.name,size:f.size}));
        setDraft(prev=>({...prev,files:[...prev.files,...files]}));
      };

      const stopEngagement=()=>{abortRef.current?.abort();setRunning(false);setRunStatus('idle');};

      return (
        <>
          <style dangerouslySetInnerHTML={{__html:STYLE_TAG}}/>
          {/* Animated background */}
          <div className="apex-bg">
            <div className="apex-blob b1"/><div className="apex-blob b2"/>
            <div className="apex-blob b3"/><div className="apex-blob b4"/>
          </div>
          {/* App shell */}
          <div style={{display:'flex',height:'100vh',overflow:'hidden',position:'relative',zIndex:1}}>
            <Sidebar
              view={view} setView={setView}
              engagements={engagements} activeEngId={activeEngId} setActiveEngId={setActiveEngId}
              setShowModal={setShowModal} pendingGate={pendingGate}
              apiKey={apiKey} setApiKey={setApiKey}
              showKeyInput={showKeyInput} setShowKeyInput={setShowKeyInput}
            />
            <div style={{flex:1,overflow:(view==='runner'||view==='library'||view==='agents')?'hidden':'auto',display:'flex',flexDirection:'column'}}>
              {view==='dashboard'&&<ViewDashboard engagements={engagements} activeEngId={activeEngId} setActiveEngId={setActiveEngId} setView={setView} setShowModal={setShowModal}/>}
              {view==='agents'   &&<ViewAgents activeAgents={activeAgents} feed={feed} deliverableMappings={deliverableMappings} setDeliverableMappings={setDeliverableMappings} agentConfigs={agentConfigs} setAgentConfigs={setAgentConfigs}/>}
              {view==='runner'   &&<ViewRunner activeEng={activeEng} running={running} runStatus={runStatus} feed={feed} feedRef={feedRef} activeAgents={activeAgents} runEngagement={runEngagement} stopEngagement={stopEngagement} setShowContext={setShowContext} setView={setView} gateArtefacts={gateArtefacts} context={context}/>}
              {view==='gate'     &&<ViewGate pendingGate={pendingGate} gateMemo={gateMemo} setGateMemo={setGateMemo} context={context} gateHistory={gateHistory} submitGate={submitGate}/>}
              {view==='library'  &&<ViewLibrary context={context}/>}
            </div>
          </div>
          {showModal   &&<EngagementModal draft={draft} setDraft={setDraft} setShowModal={setShowModal} launchEngagement={launchEngagement} dragOver={dragOver} setDragOver={setDragOver} handleDrop={handleDrop} deliverableMappings={deliverableMappings}/>}
          {showContext &&<ContextPanel context={context} setShowContext={setShowContext}/>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(APEXConsole));
  </script>
</body>
</html>
